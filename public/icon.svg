<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0520"/>
      <stop offset="100%" stop-color="#030B14"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="60%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="orb1" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="72%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background card -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="512" height="512" rx="114" fill="url(#orb1)"/>
  <rect width="512" height="512" rx="114" fill="url(#orb2)"/>

  <!--
    C ring shape
    Center: (256, 256)
    Outer radius: 155  — gap at right, ±40°
    Inner radius:  90
    Outer top opening:    (374.7, 156.4)   angle = −40°
    Outer bottom opening: (374.7, 355.6)   angle = +40°
    Inner top opening:    (324.9, 198.1)   angle = −40°
    Inner bottom opening: (324.9, 313.9)   angle = +40°
  -->
  <path
    d="M374.7 156.4
       A155 155 0 1 0 374.7 355.6
       L324.9 313.9
       A90 90 0 1 1 324.9 198.1
       Z"
    fill="url(#brand)"
  />

  <!-- Accent dot at center -->
  <circle cx="256" cy="256" r="14" fill="url(#brand)" opacity="0.55"/>
</svg>
